# Auto-build the Android APK on every push.
name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    name: Build debug APK
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android-capacitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate Android project (cap add android)
        run: npx cap add android || echo "android/ already exists, skipping add"

      - name: Apply TV-friendly AndroidManifest
        run: |
          mkdir -p android/app/src/main
          cp android-overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Copy icons + TV banner into res/
        run: |
          # Delete adaptive launcher XML files to force Android to use our CinePop PNG icons!
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/{mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,drawable}
          cp ../icons/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp ../icons/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp ../icons/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp ../icons/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp ../icons/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp ../icons/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp ../icons/icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp ../icons/icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp ../icons/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp ../icons/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp ../icons/icon-512.png android/app/src/main/res/drawable/banner.png

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          # Rename compiled APK to CinePop-TV.apk
          mv "$APK_PATH" "android/app/build/outputs/apk/debug/CinePop-TV.apk"
          echo "apk_path=android/app/build/outputs/apk/debug/CinePop-TV.apk" >> $GITHUB_OUTPUT
          echo "Found APK at android/app/build/outputs/apk/debug/CinePop-TV.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinePop-TV-Live
          path: android-capacitor/${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Determine Release Tag
        id: tag_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_info.outputs.tag }}
          name: ${{ steps.tag_info.outputs.is_tag == 'true' && format('CinePop {0}', steps.tag_info.outputs.tag) || 'CinePop Latest TV Build' }}
          body: |
            This release contains the latest automated builds of CinePop.
            
            ### ⬇️ Download Links:
            * **`CinePop-TV.apk`** (Live version - loads instantly, auto-receives website updates)
            * **`CinePop-TV-Offline.apk`** (Offline version - bundled UI, works without Cloudflare URL)
            
            ### 🔌 How to Install:
            Sideload the APK onto your Android TV using "Send Files to TV" or an installer of your choice!
          files: android-capacitor/${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
