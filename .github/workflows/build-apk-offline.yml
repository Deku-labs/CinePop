name: Build OFFLINE Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Bundle PWA + build offline APK
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android-capacitor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # 1) Bundle the PWA into android-capacitor/src + flip to offline config
      - name: Bundle PWA assets into APK
        run: |
          chmod +x bundle-offline.sh
          ./bundle-offline.sh

      # 2) Install Capacitor + add Android project
      - name: Install npm deps
        run: npm install

      # 3) Create Android project
      - name: Create Android project
        run: npx cap add android || echo "android/ already exists"

      # 4) Apply TV-friendly manifest (Leanback launcher etc.)
      - name: Apply TV-ready AndroidManifest
        run: cp android-overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      # 5) Copy app icons + 320x180 TV banner
      - name: Copy icons + TV banner
        run: |
          # Delete adaptive launcher XML files to force Android to use our CinePop PNG icons!
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/{mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,drawable}
          for d in mdpi hdpi xhdpi; do
            cp ../icons/icon-192.png "android/app/src/main/res/mipmap-$d/ic_launcher.png"
            cp ../icons/icon-192.png "android/app/src/main/res/mipmap-$d/ic_launcher_round.png"
          done
          for d in xxhdpi xxxhdpi; do
            cp ../icons/icon-512.png "android/app/src/main/res/mipmap-$d/ic_launcher.png"
            cp ../icons/icon-512.png "android/app/src/main/res/mipmap-$d/ic_launcher_round.png"
          done
          cp ../icons/icon-512.png android/app/src/main/res/drawable/banner.png

      # 6) Final sync (copies bundled web assets into android/app/src/main/assets/public)
      - name: Capacitor sync
        run: npx cap sync android

      # 7) Compile the APK
      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      # 8) Hand it to you
      - name: Find APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          # Rename compiled APK to CinePop-TV-Offline.apk
          mv "$APK" "android/app/build/outputs/apk/debug/CinePop-TV-Offline.apk"
          echo "Found: android/app/build/outputs/apk/debug/CinePop-TV-Offline.apk"
          echo "apk_path=android/app/build/outputs/apk/debug/CinePop-TV-Offline.apk" >> $GITHUB_OUTPUT

      - name: Upload OFFLINE APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CinePop-TV-Offline
          path: android-capacitor/${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90

      - name: Determine Release Tag
        id: tag_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update GitHub Release with Offline APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_info.outputs.tag }}
          name: ${{ steps.tag_info.outputs.is_tag == 'true' && format('CinePop {0}', steps.tag_info.outputs.tag) || 'CinePop Latest TV Build' }}
          body: |
            This release contains the latest automated builds of CinePop.
            
            ### ⬇️ Download Links:
            * **`CinePop-TV.apk`** (Live version - loads instantly, auto-receives website updates)
            * **`CinePop-TV-Offline.apk`** (Offline version - bundled UI, works without Cloudflare URL)
            
            ### 🔌 How to Install:
            Sideload the APK onto your Android TV using "Send Files to TV" or an installer of your choice!
          files: android-capacitor/${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
